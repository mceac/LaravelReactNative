services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: todo-api-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - todo-network

  nginx:
    image: nginx:alpine
    container_name: todo-api-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - todo-network

  mysql:
    image: mysql:8.4
    container_name: todo-api-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: todo_api
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - todo-network

networks:
  todo-network:

volumes:
  mysql-data: